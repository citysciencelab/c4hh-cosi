# Full-stack COSI deployment (BACKLOG §8): portal + routing, one command.
#
#   docker compose up -d        # build + run portal and Valhalla together
#   docker compose logs -f      # watch (Valhalla's first run builds tiles — slow)
#
# The portal is a multi-stage build (Node build → nginx runtime, deploy/Dockerfile)
# serving the static COSI SPA and our self-hosted registries, and reverse-proxying
# /valhalla/ → the Valhalla service so routing is same-origin (no CORS).
#
# Valhalla is pulled in from its self-contained compose via `include`, so it stays
# usable on its own (cd valhalla && docker compose up) AND as part of this stack.
# Its build/data tuning comes from valhalla/.env when present, else from ROOT env
# vars / built-in defaults — see the `include` note and .env.example below.

name: cosi

include:
  # The included Valhalla service interpolates its ${VARS} against THIS stack's
  # ROOT environment (root .env / Dokploy env vars) plus its own built-in
  # `${VAR:-default}`s — so a fresh clone with no valhalla/.env deploys straight
  # away. Set the routing knobs (OSM_EXTRACT_URL, BUILD_TRANSIT, HVV_GTFS_URL, …)
  # as ROOT env vars — see .env.example "Valhalla routing".
  # NB: valhalla/.env is intentionally NOT loaded here (an `include` env_file is
  # required-if-listed, which would break the no-.env case). It still applies to
  # the STANDALONE service (`cd valhalla && docker compose up`).
  - path: valhalla/docker-compose.yml

services:
  portal:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: cosi-portal:latest
    container_name: cosi-portal
    ports:
      - "${PORTAL_PORT:-8080}:80"
    environment:
      # Same-origin routing through this stack's nginx (see deploy/nginx.conf).
      - VALHALLA_URL=${VALHALLA_URL:-/valhalla}
      # Optional registry/style overrides (blank = keep the built-in values).
      - LAYER_CONF=${LAYER_CONF:-}
      - REST_CONF=${REST_CONF:-}
      - STYLE_CONF=${STYLE_CONF:-}
    depends_on:
      # Start Valhalla first, but DON'T wait for healthy — its first-run tile
      # build can take a long time; the portal serves immediately, routing
      # starts working once Valhalla is up.
      valhalla:
        condition: service_started
    restart: unless-stopped
