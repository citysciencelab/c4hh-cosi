# nginx server for the self-hosted COSI portal (BACKLOG §8).
#
# Serves the static build (dist/) and reverse-proxies routing to Valhalla so the
# portal calls it SAME-ORIGIN (/valhalla/...) — no CORS, no mixed-content, and a
# stable URL independent of where Valhalla actually runs.
#
# Layout served from the web root (/usr/share/nginx/html):
#   /cosi/        → the COSI portal (index.html + config.js/json + registries)
#   /mastercode/  → versioned, immutable JS/CSS bundles
#   /auto /basic /master → stock Masterportal example portals (harmless extras)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving the Valhalla upstream per-request (via the
    # $valhalla_upstream variable below) lets nginx START even when Valhalla isn't
    # up yet — routing calls just 502 until it is, instead of nginx refusing to boot.
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               application/geo+json image/svg+xml application/manifest+json;

    # Land visitors on the COSI portal.
    location = / {
        return 302 /cosi/;
    }

    # Same-origin routing proxy: /valhalla/<path> → Valhalla container /<path>.
    # AccessibilityAnalysis posts to <restservice.url>/isochrone; with the rest
    # service url set to "/valhalla" (see the startup hook) that becomes
    # /valhalla/isochrone here, proxied to valhalla:8002/isochrone.
    location /valhalla/ {
        set $valhalla_upstream valhalla;
        rewrite ^/valhalla/(.*)$ /$1 break;
        proxy_pass http://$valhalla_upstream:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Isochrone requests are single-origin and can be slow; give them room.
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    # Versioned build assets are content-addressed by folder name → cache hard.
    location /mastercode/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Config + registries must reflect runtime injection on every container start,
    # so never cache them.
    location ~* /(config\.js|config\.json|services\.json|rest-services\.json)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Portal shell + everything else. Masterportal keeps state in the query string
    # (no HTML5 path routing), so a plain directory/file lookup is the right fallback.
    location / {
        try_files $uri $uri/ =404;
    }
}
