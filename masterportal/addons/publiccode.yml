    genericName: 'Masterportal Addons'
    localisedName: Masterportal Addons
    longDescription: |2
       Die Masterportal Addons beinhalten spezielle Anwendungen, die individuell in die Open Source Software Masterportal per Konfiguration integriert werden können. Das Masterportal ist ein flexibler Baukasten für Geoportale im Web. In Hamburg kommt das Masterportal immer dann zum Einsatz, wenn webbasierte Kartenanwendungen benötigt werden – als eigenständige Anwendung oder als Teil einer E-Government-Lösung. Auch in anderen Städten und Kreisen wird das Masterportal eingesetzt und in einer Kooperation von mehr als 30 Partnern aus der Verwaltung weiterentwickelt. Die Masterportal Addons sind Open-Source-Software. Es ist unter der MIT-Lizenz veröffentlicht.
    shortDescription: Addons beinhalten spezielle Anwendungen für die Software Masterportal, das ein flexibler Baukasten für Geoportale im Web ist.
